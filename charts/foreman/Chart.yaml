apiVersion: v2
name: foreman
description: |
  Foreman is an opt-in add-on for LLMKube that schedules agentic workloads
  (Workload, AgenticTask) across a fleet of nodes (FleetNode). Installing
  LLMKube alone does not install or require Foreman. Install Foreman after
  llmkube; foreman-operator runs alongside llmkube-operator.
type: application
version: 0.0.1
appVersion: "0.0.1"
keywords:
  - llmkube
  - foreman
  - agentic
  - workload
  - orchestration
home: https://github.com/defilantech/LLMKube
sources:
  - https://github.com/defilantech/LLMKube
dependencies:
  # Foreman v0.8.0 ships in lockstep with llmkube v0.8.0 (the "Foreman
  # debut" release). The chart depends on the core operator + CRDs the
  # `inference.llmkube.dev` API group is registered with; pre-0.8.0
  # cores do not include the chart additions Foreman's RBAC + executor
  # rely on for the M3 + M4 nodes.
  - name: llmkube
    version: ">=0.8.0"
    repository: "https://defilantech.github.io/llmkube"
    condition: llmkube.enabled
